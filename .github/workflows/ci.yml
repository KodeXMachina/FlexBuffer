name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Quality (${{ matrix.os }}, shared=${{ matrix.shared }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        shared:
          - OFF
          - ON

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cmake libgtest-dev ninja-build

      - name: Install macOS tools
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake googletest llvm ninja
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Install Windows tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install llvm ninja -y
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          vcpkg install gtest:x64-windows

      - name: Run quality gate
        if: runner.os != 'Windows'
        env:
          CPP_DEV_CMAKE_CONFIGURE_ARGS: -G Ninja -DBUILD_SHARED_LIBS=${{ matrix.shared }}
        run: python3 scripts/quality.py check

      - name: Run quality gate
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:CC = "cl"
          $env:CXX = "cl"
          $env:CPP_DEV_CMAKE_CONFIGURE_ARGS = "-G Ninja -DBUILD_SHARED_LIBS=${{ matrix.shared }} -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows"
          python scripts/quality.py check

  sanitizers:
    name: Sanitizers (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libgtest-dev ninja-build

      - name: Configure
        run: cmake --preset asan-ubsan -G Ninja

      - name: Build
        run: cmake --build --preset asan-ubsan

      - name: Test
        run: ctest --preset asan-ubsan
